name: Deploy Portfolio to IPFS via Pinata

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    - name: Upload to Pinata via API
      run: |
        IMAGE_TAG="portfolio-$(date +%s)"
        TARGET_PATH="./dist" 
        tar -czf site.tar.gz -C "$TARGET_PATH" .

        RESPONSE=$(curl --request POST \
          --url https://api.pinata.cloud/pinning/pinFileToIPFS \
          --header "pinata_api_key: ${{ secrets.PINATA_API_KEY }}" \
          --header "pinata_secret_api_key: ${{ secrets.PINATA_SECRET_API_KEY }}" \
          --form "file=@site.tar.gz" \
          --form "pinataMetadata={\"name\": \"$IMAGE_TAG\"}")
        
        echo "Pinata Response: $RESPONSE"
