name: Deploy Portfolio to IPFS via Pinata

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    - name: Upload to Pinata via API
      uses: aave/pinata-action@v1.1
      with:
        PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
        PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        PIN_ALIAS: 'My-Decentralized-Portfolio'
        BUILD_LOCATION: './dist'
        CID_VERSION: 1
